        <script>
            async function copyEmailPro() {
                const container = document.querySelector(".nl-container");
                const clone = container.cloneNode(true);
                const baseUrl =
                    "https://proyectos.carbono.mx/proyectos/feb-prevento/";

                // 1. REPARAR FONDOS DE CABECERA (El problema principal)
                // Buscamos todas las celdas o tablas que tengan background en el HTML original
                const allElements = clone.querySelectorAll("*");
                allElements.forEach((el) => {
                    // Corregir imágenes <img>
                    if (el.tagName === "IMG") {
                        const src = el.getAttribute("src");
                        if (src && !src.startsWith("http"))
                            el.src = baseUrl + src;
                    }

                    // Corregir Background Images en el estilo inline
                    const bg = el.style.backgroundImage;
                    if (bg && bg.includes("url(")) {
                        const cleanBg = bg.replace(
                            /url\(['"]?(.*?)['"]?\)/g,
                            (match, p1) => {
                                return p1.startsWith("http")
                                    ? match
                                    : `url('${baseUrl}${p1}')`;
                            },
                        );
                        el.style.backgroundImage = cleanBg;
                        el.style.backgroundRepeat = "no-repeat";
                        el.style.backgroundPosition = "top center";
                    }

                    // FORZAR EL COLOR NARANJA DE RESPALDO
                    // Si el elemento es una celda de la cabecera, le ponemos el color a mano
                    if (
                        el.getAttribute("bgcolor") ||
                        el.style.backgroundColor
                    ) {
                        el.style.backgroundColor = "#f7a800";
                    }
                });

                // 2. EMBALAJE FINAL
                const finalHtml = `
        <div style="background-color: #f7a800; width: 100%; margin: 0; padding: 0;">
            ${clone.outerHTML}
        </div>
    `;

                try {
                    const type = "text/html";
                    const blob = new Blob([finalHtml], { type });
                    const data = [new ClipboardItem({ [type]: blob })];
                    await navigator.clipboard.write(data);

                    const btn = document.getElementById("copyBtn");
                    btn.innerText = "✨ ¡LISTO PARA TU MAIL!";
                    btn.style.backgroundColor = "#4CAF50";
                    setTimeout(() => {
                        btn.innerText = "🎯 COPIAR DISEÑO COMPLETO";
                        btn.style.backgroundColor = "#f7a800";
                    }, 3000);
                } catch (err) {
                    alert(
                        "Error al copiar. Asegúrate de estar en la URL https://",
                    );
                }
            }
        </script>
