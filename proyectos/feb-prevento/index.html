            <button

                onclick="copyUltraCompatible()"
                style="
                    background-color: #f7a800;
                    color: white;
                    border: none;
                    padding: 20px 35px;
                    border-radius: 50px;
                    font-weight: bold;
                    cursor: pointer;
                    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
                    font-family: Arial, sans-serif;
                    font-size: 18px;
                    border: 2px solid white;
                "
            >
                🎯 COPIAR DISEÑO COMPLETO
            </button>
        </div>

        <script>
            async function copyUltraCompatible() {
                const container = document.querySelector(".nl-container");
                const clone = container.cloneNode(true);
                const baseUrl =
                    "https://proyectos.carbono.mx/proyectos/feb-prevento/";

                // 1. Corregir TODAS las imágenes <img>
                clone.querySelectorAll("img").forEach((img) => {
                    const src = img.getAttribute("src");
                    if (src && !src.startsWith("http")) {
                        img.src = baseUrl + src;
                    }
                    // Asegurar que no se deformen
                    img.style.display = "block";
                });

                // 2. FORZAR FONDOS (Background Images y Colors)
                // Buscamos elementos que en el CSS original tengan fondos
                const elementsWithBg = clone.querySelectorAll("*");
                elementsWithBg.forEach((el) => {
                    // Si es el contenedor principal, forzamos el naranja
                    if (el.classList.contains("nl-container")) {
                        el.style.backgroundColor = "#f7a800";
                        el.style.width = "100%";
                    }

                    // Corregir backgrounds en los estilos inline
                    const bgImg = el.style.backgroundImage;
                    if (
                        bgImg &&
                        bgImg.includes("url(") &&
                        !bgImg.includes("http")
                    ) {
                        el.style.backgroundImage = bgImg.replace(
                            /url\(['"]?(.*?)['"]?\)/g,
                            `url('${baseUrl}$1')`,
                        );
                    }
                });

                // 3. Crear el envoltorio HTML final con estilos críticos en el Head
                const finalHtml = `
        <!DOCTYPE html>
        <html>
        <head>
            <style>
                body, table, td { background-color: #f7a800 !important; }
                .nl-container { background-color: #f7a800 !important; }
            </style>
        </head>
        <body style="margin:0; padding:0; background-color: #f7a800;">
            ${clone.outerHTML}
        </body>
        </html>
    `;

                try {
                    const type = "text/html";
                    const blob = new Blob([finalHtml], { type });
                    const data = [new ClipboardItem({ [type]: blob })];
                    await navigator.clipboard.write(data);

                    const btn = document.getElementById("copyBtn");
                    btn.innerText = "✨ ¡COPIADO CON ÉXITO!";
                    btn.style.backgroundColor = "#4CAF50";
                    setTimeout(() => {
                        btn.innerText = "🎯 COPIAR DISEÑO COMPLETO";
                        btn.style.backgroundColor = "#f7a800";
                    }, 3000);
                } catch (err) {
                    console.error(err);
                    alert(
                        "Error crítico al copiar. Verifica que la URL sea HTTPS.",
                    );
                }
            }
        </script>
